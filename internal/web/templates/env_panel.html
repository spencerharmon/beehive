{{template "header" .}}
<div id="env-panel">
<h1>Environments — {{.Name}}</h1>
<p><a href="/submodule/{{.Name}}">&larr; {{.Name}}</a></p>
<p>active: <b>{{.Env.Active}}</b></p>
<form method="post" action="/submodule/{{.Name}}/env/deploy"
      hx-post="/submodule/{{.Name}}/env/deploy" hx-target="#env-panel" hx-select="#env-panel" hx-swap="outerHTML"
      hx-indicator="#htmx-progress"
      hx-confirm="Switch {{.Name}}'s active environment to the selected target?">
  <label class="sr-only" for="env-deploy-target">Deploy environment</label>
  <select id="env-deploy-target" name="target">{{range .Env.Envs}}<option>{{.}}</option>{{end}}</select>
  <button>deploy</button>
</form>
</div>
{{template "footer"}}
