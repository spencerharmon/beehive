{{with .Sync}}<p class="sync-status{{if .Err}} stale{{end}}">followed {{.Ago}} ago{{if .Err}} · pull stalled: {{.Err}}{{end}}</p>{{end}}
<ul class="sessions">
{{range .Sessions}}<li>
  <a href="/submodule/{{$.Name}}/session/{{.ID}}">{{.ID}}</a>
  {{if .Live}}<span class="badge live">running</span>{{else}}<span class="badge">idle</span>{{end}}
  <span class="ago">{{.Ago}} ago</span>
</li>{{else}}<li>no sessions yet</li>{{end}}
</ul>
