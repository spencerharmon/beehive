{{template "header"}}
<h1>Submodules</h1>
<p>Active env: <b>{{.Env.Active}}</b> · <a href="/edit?file=INFRASTRUCTURE.md">edit infrastructure with AI</a></p>
<div class="cards">
{{range .Subs}}<div class="card"><h3><a href="/submodule/{{.Name}}">{{.Name}}</a></h3>
<span class="badge">{{.State}}</span> pending: {{.Pending}} stamp: {{.Stamp}}
<div><a href="/submodule/{{.Name}}/plan">plan</a> · <a href="/submodule/{{.Name}}/branches">branches</a> · <a href="/submodule/{{.Name}}/sessions">sessions</a> · <a href="/roi/{{.Name}}">roi</a> · <a href="/edit?file=submodules/{{.Name}}/ROI.md">edit roi (AI)</a></div></div>{{else}}<p>no submodules</p>{{end}}
</div>
<form method="post" action="/submodule/add"><input name="name" placeholder="new submodule"><button>add</button></form>
{{template "footer"}}
