{{template "header"}}
<h1>chat-edit · {{.Path}}</h1>
<p><a href="/">dashboard</a> · propose changes to any repo file by chatting with the AI editor. Nothing is written or committed until you approve a proposal.</p>
<div id="chatedit"
     hx-get="/edit/{{.ID}}/panel"
     hx-trigger="load"
     hx-swap="innerHTML">
  <p>loading…</p>
</div>
<form hx-post="/edit/{{.ID}}/message" hx-target="#chatedit" hx-swap="innerHTML"
      hx-on::after-request="this.reset()">
  <input name="message" placeholder="Ask for a change to {{.Path}}…" autocomplete="off" autofocus style="width:70%">
  <button>send</button>
</form>
{{template "footer"}}
