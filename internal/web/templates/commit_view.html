{{template "header" .}}
<p><a href="/submodule/{{.Name}}/branches">&larr; {{.Name}} commits</a></p>
<h1>{{.Name}} <code>{{.SHA}}</code></h1>
<p class="muted">{{.Subject}}</p>
<p class="muted">{{.Author}} &middot; {{.Date}}</p>
<pre class="diff">{{range .Rows}}<span class="ln {{.Kind}}">{{.HTML}}</span>
{{else}}<span class="muted">no PLAN.md change in this commit</span>{{end}}</pre>
{{template "footer"}}
