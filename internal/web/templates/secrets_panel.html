{{template "header" .}}
<div id="secrets-panel">
<h1>Secrets</h1>
<ul class="secrets">
{{range .Keys}}<li>
  <code>{{.}}</code>
  <details class="inline-edit">
    <summary>edit</summary>
    <form method="post" action="/secrets"
          hx-post="/secrets" hx-target="#secrets-panel" hx-select="#secrets-panel" hx-swap="outerHTML"
          hx-indicator="#htmx-progress">
      <input type="hidden" name="key" value="{{.}}">
      <input name="value" type="password" placeholder="new value for {{.}}" aria-label="new value for {{.}}" autocomplete="off">
      <button>save</button>
    </form>
  </details>
</li>{{else}}<li class="muted">none</li>{{end}}
</ul>
<details class="inline-edit" open>
  <summary>add secret</summary>
  <form method="post" action="/secrets"
        hx-post="/secrets" hx-target="#secrets-panel" hx-select="#secrets-panel" hx-swap="outerHTML"
        hx-indicator="#htmx-progress">
    <input name="key" placeholder="key" aria-label="secret key" autocomplete="off">
    <input name="value" type="password" placeholder="value" aria-label="secret value" autocomplete="off">
    <button>set</button>
  </form>
</details>
</div>
{{template "footer"}}
