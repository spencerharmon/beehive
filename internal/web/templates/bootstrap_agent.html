<div class="bootstrap-agent">
  <div id="chatedit"
       hx-get="/edit/{{.ID}}/panel"
       hx-trigger="load"
       hx-swap="innerHTML"
       role="status" aria-live="polite">
    <div class="skeleton-block" aria-hidden="true">
      <span class="skeleton-bar"></span><span class="skeleton-bar"></span><span class="skeleton-bar"></span><span class="skeleton-bar"></span>
    </div>
    <span class="sr-only">loading setup assistant…</span>
  </div>
  <form hx-post="/edit/{{.ID}}/message" hx-target="#chatedit" hx-swap="innerHTML"
        hx-on::after-request="this.reset()">
    <input name="message" placeholder="Ask the setup guide, or say &ldquo;draft LOCALS.md&rdquo;&hellip;" autocomplete="off" style="width:70%">
    <button>send</button>
  </form>
</div>
