<div class="bootstrap-agent">
  <div id="chatedit"
       hx-get="/edit/{{.ID}}/panel"
       hx-trigger="load"
       hx-swap="innerHTML">
    <p class="muted">loading setup assistant&hellip;</p>
  </div>
  <form hx-post="/edit/{{.ID}}/message" hx-target="#chatedit" hx-swap="innerHTML"
        hx-on::after-request="this.reset()">
    <input name="message" placeholder="Ask the setup guide, or say &ldquo;draft LOCALS.md&rdquo;&hellip;" aria-label="message to the setup guide" autocomplete="off" style="width:70%">
    <button>send</button>
  </form>
</div>
