{{template "header"}}
<h1>edit · {{.File}}</h1>
<p><a href="/">dashboard</a> · chatting with the AI editor on its own branch. Changes are not live until merged.</p>
<div id="editor"
     hx-get="/editor/{{.ID}}/panel"
     hx-trigger="load, every 1500ms"
     hx-swap="innerHTML"
     role="status" aria-live="polite">
  <div class="skeleton-block" aria-hidden="true">
    <span class="skeleton-bar"></span><span class="skeleton-bar"></span><span class="skeleton-bar"></span><span class="skeleton-bar"></span>
  </div>
  <span class="sr-only">loading editor…</span>
</div>
<form hx-post="/editor/{{.ID}}/chat" hx-target="#editor" hx-swap="innerHTML"
      hx-on::after-request="this.reset()">
  <input name="message" placeholder="Ask the editor to change something…" autocomplete="off" autofocus style="width:70%">
  <button>send</button>
</form>
<form method="post" action="/editor/{{.ID}}/close" onsubmit="return confirm('Close this editor session and discard its worktree? Merged changes stay; unmerged proposals are lost.');">
  <button class="danger">close session</button>
</form>
{{template "footer"}}
