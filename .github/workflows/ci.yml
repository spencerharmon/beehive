name: ci
on:
  push: { branches: [main] }
  pull_request: {}
permissions: { contents: read }
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - run: gofmt -l . | tee /tmp/fmt && test ! -s /tmp/fmt
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -count=1 ./...
      - run: ./scripts/submodule-smoke.sh   # fake submodule: exercise selection/claim/worktree paths
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - uses: golangci/golangci-lint-action@v6
        with: { version: latest }
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-test, lint]
    runs-on: ubuntu-latest
    permissions: { contents: write, id-token: write }
    strategy:
      matrix: { goos: [linux, darwin], goarch: [amd64, arm64] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - run: |
          for bin in beehive beehived honeybee; do
            CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
              go build -o dist/$bin-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/$bin
          done
          (cd dist && sha256sum * > SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }})
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign-blob --yes dist/SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }} --output-signature dist/SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }}.sig
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
