name: ci
on:
  push: { branches: [main] }
  pull_request: {}
permissions: { contents: read }
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - run: gofmt -l . | tee /tmp/fmt && test ! -s /tmp/fmt
      - run: go vet ./...
      - run: CGO_ENABLED=0 go build ./...
      - run: go test -race -count=1 ./...
      - run: ./scripts/submodule-smoke.sh   # fake submodule: exercise selection/claim/worktree paths
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - uses: golangci/golangci-lint-action@v6
        with: { version: latest }
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-test, lint]
    runs-on: ubuntu-latest
    permissions: { contents: write, id-token: write }
    strategy:
      matrix: { goos: [linux, darwin], goarch: [amd64, arm64] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - name: cross-compile static binaries (CGO_ENABLED=0)
        run: |
          set -euo pipefail
          mkdir -p dist
          for bin in beehive beehived honeybee; do
            CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
              go build -trimpath -o "dist/$bin-${{ matrix.goos }}-${{ matrix.goarch }}" "./cmd/$bin"
          done
          ( cd dist && sha256sum \
              "beehive-${{ matrix.goos }}-${{ matrix.goarch }}" \
              "beehived-${{ matrix.goos }}-${{ matrix.goarch }}" \
              "honeybee-${{ matrix.goos }}-${{ matrix.goarch }}" \
              > "SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }}" )
      - name: assert linux binaries are statically linked
        if: matrix.goos == 'linux'
        run: |
          set -euo pipefail
          fail=0
          for bin in beehive beehived honeybee; do
            f="dist/$bin-${{ matrix.goos }}-${{ matrix.goarch }}"
            desc=$(file -b "$f")
            echo "$f: $desc"
            case "$desc" in
              *"statically linked"*) ;;
              *) echo "::error::$f is not statically linked"; fail=1 ;;
            esac
            case "$desc" in
              *"dynamically linked"*) echo "::error::$f has dynamic deps"; fail=1 ;;
            esac
          done
          exit $fail
      - uses: sigstore/cosign-installer@v3
      - name: keyless cosign sign-blob of the checksums manifest
        run: |
          set -euo pipefail
          sums="dist/SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }}"
          # Keyless (OIDC): publish BOTH the signature and the Fulcio certificate
          # so `cosign verify-blob` can run without any shared key/secret.
          cosign sign-blob --yes "$sums" \
            --output-signature "$sums.sig" \
            --output-certificate "$sums.pem"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
  verify-release:
    # Prove the published artifacts actually verify from a clean runner:
    # download them, run keyless `cosign verify-blob`, check the checksums, and
    # re-assert static linkage. This is the acceptance gate.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    permissions: { contents: read }
    strategy:
      matrix: { goos: [linux, darwin], goarch: [amd64, arm64] }
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - uses: sigstore/cosign-installer@v3
      - name: download published artifacts for this os/arch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --dir dist \
            --pattern "*-${{ matrix.goos }}-${{ matrix.goarch }}" \
            --pattern "SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }}*"
      - name: verify signature + checksums + static linkage
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: ./scripts/verify-release.sh ${{ matrix.goos }} ${{ matrix.goarch }} dist
