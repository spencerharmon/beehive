name: ci
on:
  push: { branches: [main] }
  pull_request: {}
permissions: { contents: read }
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - run: gofmt -l . | tee /tmp/fmt && test ! -s /tmp/fmt
      - run: go vet ./...
      - run: CGO_ENABLED=0 go build ./...
      - run: go test -race -count=1 ./...
      - run: ./scripts/submodule-smoke.sh   # fake submodule: exercise selection/claim/worktree paths
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - uses: golangci/golangci-lint-action@v6
        with: { version: latest }
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-test, lint]
    runs-on: ubuntu-latest
    permissions: { contents: write, id-token: write }
    strategy:
      matrix: { goos: [linux, darwin], goarch: [amd64, arm64] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - name: cross-compile static binaries + checksums
        run: |
          mkdir -p dist
          for bin in beehive beehived honeybee; do
            CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
              go build -trimpath -o dist/$bin-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/$bin
          done
          # hash only the component binaries (never the sums file itself)
          (cd dist && sha256sum beehive-* beehived-* honeybee-* > SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }})
      - uses: sigstore/cosign-installer@v3
      - name: cosign-sign checksums (keyless — emit signature + certificate)
        run: |
          sums=dist/SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }}
          cosign sign-blob --yes "$sums" \
            --output-signature "$sums.sig" \
            --output-certificate "$sums.pem"
      - name: verify artifacts (static + checksum + cosign) before publishing
        run: ./scripts/verify-release.sh dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
  verify-release:
    # Acceptance gate, run from a CLEAN environment (per the task caveat):
    # on a fresh runner, download the just-published artifacts and re-run the
    # same checks — static linkage, checksums, and keyless `cosign verify-blob`
    # — against the real published bytes, with nothing left over from the build.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    permissions: { contents: read }
    strategy:
      matrix: { goos: [linux, darwin], goarch: [amd64, arm64] }
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22', cache: true }
      - uses: sigstore/cosign-installer@v3
      - name: download published artifacts for this os/arch
        env: { GH_TOKEN: '${{ github.token }}' }
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --dir dist \
            --pattern "*-${{ matrix.goos }}-${{ matrix.goarch }}" \
            --pattern "SHA256SUMS-${{ matrix.goos }}-${{ matrix.goarch }}*"
      - name: verify (static + checksum + cosign) from a clean checkout
        run: ./scripts/verify-release.sh dist
