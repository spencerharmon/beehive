\* Handoff gate enforced: a task reaches DONE only with real, durable, merged
\* work; the task always terminates; lost work never strands. No error.
SPECIFICATION Spec
CONSTANTS
    Limit = 1
    Gated = TRUE
INVARIANTS
    TypeOK
    LegalTransitionsOnly
    NoFalseDone
    AttemptsBounded
PROPERTIES
    Terminates
    LostWorkRecovers
