\* Both DONE gates enforced (durable-on-origin AND definition-of-done check): a
\* task reaches DONE only with real, durable, merged work whose declared Check is
\* satisfied; the task always terminates; lost work never strands. No error.
SPECIFICATION Spec
CONSTANTS
    Limit = 1
    Gated = TRUE
    CheckGated = TRUE
INVARIANTS
    TypeOK
    LegalTransitionsOnly
    NoFalseDone
    AttemptsBounded
PROPERTIES
    Terminates
    LostWorkRecovers
