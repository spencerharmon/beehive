\* Fixed protocol: the runner owns the gitlink and pins it to the tracked tip.
\* Even though a byzantine agent COULD stage a bee tip, AgentBumpsBeeTip is
\* disabled here (~Fixed) and the runner pin holds both invariants across the
\* merge+reclaim. No error.
SPECIFICATION Spec
CONSTANTS
    MaxTasks = 2
    Fixed = TRUE
INVARIANTS
    TypeOK
    PointerDurable
    PointerIsTrackedTip
