\* Mid-turn heartbeat keepalive + decoupled selection staleness (301964d): a live
\* owner is never seen stale, so no second session ever dispatches on it. Both
\* the correctness backstop and the no-duplicate-dispatch property hold, and the
\* task always lands.
SPECIFICATION Spec
CONSTANTS
    Sessions = {1, 2}
    MaxClock = 4
    SelStale = 1
    Fixed = TRUE
INVARIANTS
    TypeOK
    AtMostOneLands
    NoDuplicateDispatch
PROPERTIES
    EventuallyLanded
