\* Phantom-dep refusal on: a blocked yield is accepted only for a real dep, so a
\* held task always has a real dependency and the task never wedges forever
\* (real dep -> DONE; phantom dep -> escalated NEEDS-HUMAN). No error.
SPECIFICATION Spec
CONSTANTS
    DepGuard = TRUE
INVARIANTS
    TypeOK
    HeldImpliesRealDep
PROPERTIES
    EventuallyResolved
