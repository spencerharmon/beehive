\* No keepalive (pre-301964d): a live owner's heartbeat goes stale to selection
\* and a second session dispatches on top of it. NoDuplicateDispatch is violated,
\* with the trace. AtMostOneLands STILL holds (the publish-conflict backstop),
\* so it is checked here too to demonstrate the backstop survives the bug.
SPECIFICATION Spec
CONSTANTS
    Sessions = {1, 2}
    MaxClock = 4
    SelStale = 1
    Fixed = FALSE
INVARIANTS
    TypeOK
    AtMostOneLands
    NoDuplicateDispatch
