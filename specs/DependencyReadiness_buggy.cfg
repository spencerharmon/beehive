\* Pre-92d2ed1: any blocked yield is accepted, so a task yielded on a PHANTOM dep
\* is silently HELD forever -- it can never progress (the dep can never become
\* DONE). Reproduces flux:phantom-...-repin wedged on jellyfin:jellyfin-image-build.
\* HeldImpliesRealDep violated (safety) and EventuallyResolved violated (liveness);
\* deadlock checking is off because the wedge IS the intended defect.
SPECIFICATION Spec
CONSTANTS
    DepGuard = FALSE
INVARIANTS
    TypeOK
    HeldImpliesRealDep
PROPERTIES
    EventuallyResolved
CHECK_DEADLOCK
    FALSE
